<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="הבית שלנו">
<title>🏠 הבית שלנו</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body { height: 100dvh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f2f2f7; direction: rtl; color: #1c1c1e; }

.app { max-width: 540px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; background: #fff; }

/* HEADER */
.hdr { padding: 16px 20px 13px; background: #fff; border-bottom: 1px solid #e5e5ea; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.hdr h1 { font-size: 20px; font-weight: 700; color: #1c1c1e; }
.hdr-sub { font-size: 13px; color: #8e8e93; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.cdot { width: 8px; height: 8px; border-radius: 50%; background: #c7c7cc; flex-shrink: 0; transition: background .3s; }
.cdot.on { background: #34c759; }
.bell-btn { background: none; border: none; cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 50%; position: relative; }
.bell-btn:active { background: #f2f2f7; }
.nbadge { position: absolute; top: 4px; right: 4px; background: #ff3b30; color: #fff; font-size: 10px; font-weight: 700; min-width: 17px; height: 17px; border-radius: 99px; display: none; align-items: center; justify-content: center; padding: 0 4px; }

/* SYNC PILL */
.sync-wrap { position: absolute; top: 76px; left: 0; right: 0; z-index: 100; display: flex; justify-content: center; padding: 0 20px; pointer-events: none; }
.sync-pill { background: #3730a3; color: #fff; font-size: 14px; padding: 10px 20px; border-radius: 99px; opacity: 0; transition: opacity .3s; max-width: 90%; text-align: center; }
.sync-pill.show { opacity: 1; }

/* NOTIF PANEL */
.npanel { background: #f9f9fb; border-bottom: 1px solid #e5e5ea; max-height: 0; overflow: hidden; transition: max-height .25s ease; flex-shrink: 0; }
.npanel.open { max-height: 240px; overflow-y: auto; }
.nhead { padding: 11px 20px 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e5ea; }
.nhead span { font-size: 13px; font-weight: 600; color: #636366; }
.nhead button { background: none; border: none; cursor: pointer; font-size: 14px; color: #534AB7; font-family: inherit; }
.nrow { padding: 12px 20px; display: flex; gap: 12px; align-items: flex-start; border-bottom: 1px solid #f2f2f7; }
.nrow.isnew { background: #f0effe; }
.ndot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.ndot.new { background: #534AB7; } .ndot.old { background: #c7c7cc; }
.ntext { font-size: 14px; color: #1c1c1e; flex: 1; line-height: 1.45; }
.ntime { font-size: 12px; color: #8e8e93; margin-top: 3px; }

/* CONTENT */
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px 8px; }
.section { display: none; } .section.active { display: block; }

/* ADD BAR */
.add-bar { display: flex; gap: 10px; margin-bottom: 16px; }
.add-bar input { flex: 1; padding: 13px 16px; border: 1.5px solid #e5e5ea; border-radius: 14px; font-size: 16px; background: #f9f9fb; color: #1c1c1e; direction: rtl; outline: none; font-family: inherit; }
.add-bar input:focus { border-color: #534AB7; background: #fff; }
.addbtn { width: 50px; height: 50px; background: #534AB7; color: #fff; border: none; border-radius: 14px; cursor: pointer; font-size: 26px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.addbtn:active { background: #3C3489; transform: scale(.96); }

/* LIST LABEL */
.slabel { font-size: 12px; font-weight: 600; color: #8e8e93; margin-bottom: 8px; letter-spacing: .4px; text-transform: uppercase; }

/* ITEM CARDS */
.icard { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #f9f9fb; border-radius: 16px; margin-bottom: 8px; border: 1px solid #f0f0f5; }
.icard.done .itext { text-decoration: line-through; color: #8e8e93; }
.cb { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #c7c7cc; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; font-size: 14px; }
.cb.chk { background: #534AB7; border-color: #534AB7; color: #fff; }
.itext { flex: 1; font-size: 16px; color: #1c1c1e; }
.bytag { font-size: 12px; color: #c7c7cc; flex-shrink: 0; }
.idel { background: none; border: none; cursor: pointer; color: #c7c7cc; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 8px; }
.idel:active { color: #ff3b30; background: #fff0ee; }

/* EVENTS */
.ecard { padding: 14px 16px; background: #f9f9fb; border-radius: 16px; margin-bottom: 8px; border: 1px solid #f0f0f5; display: flex; gap: 14px; align-items: center; }
.ecard.past { opacity: .45; }
.edate { text-align: center; min-width: 42px; flex-shrink: 0; }
.edate .day { font-size: 26px; font-weight: 700; color: #534AB7; line-height: 1; }
.edate .mon { font-size: 11px; color: #8e8e93; margin-top: 2px; }
.einfo { flex: 1; min-width: 0; }
.ename { font-size: 16px; font-weight: 500; color: #1c1c1e; }
.esub { font-size: 13px; color: #636366; margin-top: 5px; display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.bdg { font-size: 12px; padding: 3px 9px; border-radius: 99px; font-weight: 500; }
.bk { background: #d1fae5; color: #065f46; } .bc { background: #ede9fe; color: #4c1d95; } .bg { background: #dbeafe; color: #1e3a8a; }
.today-dot { width: 7px; height: 7px; border-radius: 50%; background: #ff3b30; display: inline-block; margin-left: 4px; vertical-align: middle; }
.sep-label { font-size: 12px; color: #8e8e93; text-align: center; padding: 10px 0 6px; border-top: 1px solid #e5e5ea; margin-top: 6px; }

/* EVENT FORM */
.evform { background: #f9f9fb; border: 2px solid #534AB7; border-radius: 18px; padding: 18px; margin-bottom: 16px; display: none; flex-direction: column; gap: 13px; }
.evform.open { display: flex; }
.evform input[type=text] { width: 100%; padding: 13px 16px; border: 1.5px solid #e5e5ea; border-radius: 12px; font-size: 16px; background: #fff; color: #1c1c1e; direction: rtl; outline: none; font-family: inherit; }
.evform input[type=text]:focus { border-color: #534AB7; }
.evform input[type=date], .evform input[type=time] { flex: 1; padding: 12px 10px; border: 1.5px solid #e5e5ea; border-radius: 12px; font-size: 15px; background: #fff; color: #1c1c1e; font-family: inherit; outline: none; }
.form-row { display: flex; gap: 10px; }
.catbtn { flex: 1; padding: 10px 4px; border: 1.5px solid #e5e5ea; border-radius: 12px; font-size: 14px; cursor: pointer; background: #fff; color: #636366; font-family: inherit; font-weight: 500; }
.catbtn.sel { background: #534AB7; color: #fff; border-color: #534AB7; }
.form-actions { display: flex; gap: 10px; }
.btn-cancel { flex: 1; padding: 13px; border: 1.5px solid #e5e5ea; border-radius: 12px; font-size: 15px; cursor: pointer; background: #fff; color: #636366; font-family: inherit; }
.btn-add { flex: 2; padding: 13px; background: #534AB7; color: #fff; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; font-family: inherit; font-weight: 600; }
.btn-add:active { background: #3C3489; }

/* TASKS */
.tcard { padding: 14px 16px; background: #f9f9fb; border-radius: 16px; margin-bottom: 8px; border: 1px solid #f0f0f5; display: flex; align-items: center; gap: 12px; }
.tcard.done .tname { text-decoration: line-through; color: #8e8e93; }
.tname { flex: 1; font-size: 16px; color: #1c1c1e; }
.wtag { font-size: 13px; padding: 5px 12px; border-radius: 99px; background: #fff; border: 1.5px solid #e5e5ea; color: #534AB7; cursor: pointer; flex-shrink: 0; font-weight: 500; }

/* REMINDERS */
.rcard { padding: 14px 16px; background: #f9f9fb; border-radius: 16px; margin-bottom: 8px; border: 1px solid #f0f0f5; display: flex; gap: 13px; align-items: center; }
.rname { font-size: 16px; font-weight: 500; color: #1c1c1e; }
.rwho { font-size: 13px; color: #8e8e93; margin-top: 3px; }

/* MESSAGES */
#sec-msg { display: none; flex-direction: column; }
#sec-msg.active { display: flex; height: 100%; }
.msg-feed { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 13px; padding-bottom: 10px; min-height: 0; }
.day-sep { text-align: center; font-size: 12px; color: #8e8e93; padding: 4px 0; }
.bwrp { display: flex; flex-direction: column; max-width: 80%; }
.bwrp.mine { align-self: flex-end; align-items: flex-end; }
.bwrp.theirs { align-self: flex-start; align-items: flex-start; }
.bubble { padding: 11px 15px; border-radius: 20px; font-size: 16px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.bubble.mine { background: #534AB7; color: #fff; border-bottom-left-radius: 5px; }
.bubble.theirs { background: #f2f2f7; color: #1c1c1e; border-bottom-right-radius: 5px; }
.bmeta { font-size: 12px; color: #8e8e93; margin-top: 4px; padding: 0 3px; }
.msginput { border-top: 1px solid #e5e5ea; padding: 12px 16px 20px; display: flex; gap: 10px; align-items: flex-end; background: #fff; flex-shrink: 0; }
.msgtxt { flex: 1; padding: 11px 15px; border: 1.5px solid #e5e5ea; border-radius: 22px; font-size: 16px; font-family: inherit; background: #f9f9fb; color: #1c1c1e; direction: rtl; resize: none; min-height: 44px; max-height: 110px; overflow-y: auto; line-height: 1.4; outline: none; }
.msgtxt:focus { border-color: #534AB7; background: #fff; }
.msgsend { width: 44px; height: 44px; background: #534AB7; border: none; border-radius: 50%; cursor: pointer; color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.msgsend:disabled { background: #e5e5ea; color: #8e8e93; }
.msgsend:active { background: #3C3489; }

/* NAV */
.nav { display: flex; border-top: 1px solid #e5e5ea; background: #fff; padding-bottom: env(safe-area-inset-bottom, 8px); flex-shrink: 0; }
.navbtn { flex: 1; padding: 10px 2px 8px; border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; color: #8e8e93; font-family: inherit; min-height: 56px; }
.navbtn.active { color: #534AB7; }
.navbtn svg { width: 26px; height: 26px; stroke: currentColor; stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; }

/* MISC */
.empty { text-align: center; padding: 40px 20px; color: #8e8e93; font-size: 16px; }
.loader-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; color: #8e8e93; font-size: 16px; }
.spinner { width: 32px; height: 32px; border: 3px solid #e5e5ea; border-top-color: #534AB7; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* IDENTITY */
#id-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; padding: 40px 28px; gap: 28px; background: #fff; }
.id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
.id-btn { padding: 28px 16px; border: 2px solid #e5e5ea; border-radius: 20px; background: #f9f9fb; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 12px; font-family: inherit; transition: all .15s; }
.id-btn:active { background: #f0effe; border-color: #534AB7; transform: scale(.97); }
.id-btn-name { font-size: 20px; font-weight: 700; color: #1c1c1e; }
</style>
</head>
<body>

<div id="id-screen">
  <div style="font-size:60px">🏠</div>
  <div style="text-align:center">
    <div style="font-size:26px;font-weight:700;color:#1c1c1e">הבית שלנו</div>
    <div style="font-size:17px;color:#8e8e93;margin-top:8px">מי את/ה?</div>
  </div>
  <div class="id-grid">
    <button class="id-btn" onclick="setMe('זיו')">
      <div style="font-size:44px">👨</div>
      <div class="id-btn-name">זיו</div>
    </button>
    <button class="id-btn" onclick="setMe('שני')">
      <div style="font-size:44px">👩</div>
      <div class="id-btn-name">שני</div>
    </button>
  </div>
</div>

<div id="main-app" style="display:none;height:100dvh">
<div class="app" style="position:relative">
  <div class="hdr">
    <div>
      <h1>🏠 הבית שלנו</h1>
      <div class="hdr-sub"><span class="cdot" id="cdot"></span><span id="ctext">מתחבר...</span></div>
    </div>
    <button class="bell-btn" onclick="toggleN()" aria-label="התראות">
      🔔<div class="nbadge" id="nbadge"></div>
    </button>
  </div>

  <div class="sync-wrap"><div class="sync-pill" id="syncpill"></div></div>

  <div class="npanel" id="npanel">
    <div class="nhead"><span>עדכונים</span><button onclick="markRead()">סמן כנקרא</button></div>
    <div id="nlist"></div>
  </div>

  <div class="content">
    <div class="loader-wrap" id="loader"><div class="spinner"></div>מתחבר...</div>
    <div id="sections" style="display:none">

      <div class="section active" id="sec-shop">
        <div class="add-bar"><input id="si" placeholder="הוסף פריט לקניות..." /><button class="addbtn" onclick="addShop()">+</button></div>
        <div class="slabel">לא נקנה</div><div id="spend"></div>
        <div id="sdone-wrap" style="display:none"><div class="slabel" style="margin-top:14px">נקנה ✓</div><div id="sdone"></div></div>
      </div>

      <div class="section" id="sec-ev">
        <button class="addbtn" onclick="toggleEvForm()" style="width:100%;border-radius:16px;font-size:17px;height:50px;margin-bottom:16px;gap:8px">+ הוסף אירוע</button>
        <div class="evform" id="evform">
          <input type="text" id="evi" placeholder="שם האירוע (חובה)" />
          <div class="form-row"><input type="date" id="evdate" /><input type="time" id="evtime" /></div>
          <div class="form-row">
            <button class="catbtn sel" id="cat-kids" onclick="selCat('kids')">ילדים</button>
            <button class="catbtn" id="cat-couple" onclick="selCat('couple')">זוג</button>
            <button class="catbtn" id="cat-general" onclick="selCat('general')">כללי</button>
          </div>
          <div class="form-actions"><button class="btn-cancel" onclick="closeEvForm()">ביטול</button><button class="btn-add" onclick="addEv()">הוסף</button></div>
        </div>
        <div id="evlist"></div>
      </div>

      <div class="section" id="sec-task">
        <div class="add-bar"><input id="tski" placeholder="משימה חדשה..." /><button class="addbtn" onclick="addTask()">+</button></div>
        <div id="tasklist"></div>
      </div>

      <div class="section" id="sec-rem">
        <div class="add-bar"><input id="remi" placeholder="תזכורת חדשה..." /><button class="addbtn" onclick="addRem()">+</button></div>
        <div id="remlist"></div>
      </div>

      <div class="section" id="sec-msg">
        <div class="msg-feed" id="msgfeed"></div>
        <div class="msginput">
          <textarea class="msgtxt" id="msgi" placeholder="כתוב/י משהו אישי..." rows="1" oninput="autoR(this)" onkeydown="msgKey(event)"></textarea>
          <button class="msgsend" id="msgsend" onclick="sendMsg()" disabled>➤</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="navbtn active" onclick="showTab('shop',this)">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>קניות
    </button>
    <button class="navbtn" onclick="showTab('ev',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>אירועים
    </button>
    <button class="navbtn" onclick="showTab('task',this)">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>משימות
    </button>
    <button class="navbtn" onclick="showTab('rem',this)">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>תזכורות
    </button>
    <button class="navbtn" onclick="showTab('msg',this)">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>מכתבים
    </button>
  </nav>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyD8i4Jr23tF9CZSEzAXDUyIPuYgpyHcMUg",authDomain:"halamish-s-home.firebaseapp.com",projectId:"halamish-s-home",storageBucket:"halamish-s-home.firebasestorage.app",messagingSenderId:"752500579",appId:"1:752500579:web:a26b6b2094ae45df159d56"});
const db=firebase.firestore();
const DOCS={};['shop','evs','tasks','rems','msgs','log'].forEach(k=>{DOCS[k]=db.collection('home').doc(k);});

let me=null,lastSeen=0,nOpen=false,uid=Date.now(),selcat='kids',appReady=false;
const loaded=new Set(),ALL=['shop','evs','tasks','rems','msgs','log'];
const MN=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const MNS=['ינו','פבר','מרץ','אפר','מאי','יוני','יולי','אוג','ספט','אוק','נוב','דצמ'];
function suf(u){return u==='שני'?'ה':'';}
const state={shop:[],evs:[],tasks:[],rems:[],msgs:[],log:[]};
const SEED={
  shop:[{id:1,text:'חלב',done:false,by:'זיו'},{id:2,text:'לחם',done:false,by:'שני'},{id:3,text:'ביצים',done:true,by:'זיו'}],
  evs:[{id:4,name:'חוג כדורגל לילדים',dateStr:'2026-07-05',timeStr:'17:00',cat:'kids',by:'שני'},{id:5,name:'ערב זוגי',dateStr:'2026-07-12',timeStr:'19:30',cat:'couple',by:'זיו'}],
  tasks:[{id:7,name:'לתאם רופא שיניים',done:false,who:'שני'},{id:8,name:'לחדש ביטוח רכב',done:false,who:'זיו'}],
  rems:[{id:10,name:'תרופות לכלב — כל שישי',by:'שני'}],msgs:[],log:[]};

async function save(k){try{await DOCS[k].set({items:state[k],ts:Date.now(),by:me});}catch(e){console.error(e);}}
function addLog(msg){state.log.unshift({u:me,msg,t:Date.now()});if(state.log.length>60)state.log.length=60;save('log');updateBadge();}
function updateBadge(){const n=state.log.filter(e=>e.u!==me&&e.t>lastSeen).length;const b=document.getElementById('nbadge');b.style.display=n?'flex':'none';b.textContent=n>9?'9+':n;}
function showSync(msg){const p=document.getElementById('syncpill');p.textContent=msg;p.classList.add('show');clearTimeout(p._t);p._t=setTimeout(()=>p.classList.remove('show'),3500);}
function setConn(on){document.getElementById('cdot').className='cdot'+(on?' on':'');document.getElementById('ctext').textContent=`מחובר${me==='שני'?'ת':''} כ${me}`+(on?' · מסונכרן':'');}
function startListeners(){
  ALL.forEach(k=>{DOCS[k].onSnapshot(doc=>{
    const d=doc.exists?(doc.data().items||[]):[];
    const byOther=doc.exists&&doc.data().by&&doc.data().by!==me;
    const wasReady=appReady;state[k]=d;
    if(!loaded.has(k)){loaded.add(k);if(loaded.size===ALL.length)initApp();}
    else if(wasReady){renderSection(k);updateBadge();if(nOpen)renderN();if(byOther&&k==='log'&&d.length)showSync(d[0].msg);}
    setConn(true);},err=>{console.error(err);setConn(false);});});
}
function renderSection(k){const m={shop:renderShop,evs:renderEv,tasks:renderTask,rems:renderRem,msgs:renderMsgs};if(m[k])m[k]();}
async function initApp(){
  if(ALL.every(k=>!state[k].length)){Object.assign(state,JSON.parse(JSON.stringify(SEED)));for(const k of ALL)await save(k);}
  appReady=true;document.getElementById('loader').style.display='none';document.getElementById('sections').style.display='block';
  document.getElementById('sec-shop').style.display='block';renderShop();renderEv();renderTask();renderRem();renderMsgs();updateBadge();
}
function toggleN(){nOpen=!nOpen;document.getElementById('npanel').classList.toggle('open',nOpen);if(nOpen)renderN();}
function renderN(){
  const el=document.getElementById('nlist');if(!state.log.length){el.innerHTML='<div style="padding:18px;text-align:center;font-size:15px;color:#8e8e93">אין עדכונים עדיין</div>';return;}
  el.innerHTML=state.log.map(e=>{const isNew=e.u!==me&&e.t>lastSeen;const m=Math.floor((Date.now()-e.t)/60000);
    const ago=m<1?'עכשיו':m<60?`${m} דק'`:`${Math.floor(m/60)} שע'`;
    return`<div class="nrow ${isNew?'isnew':''}"><div class="ndot ${isNew?'new':'old'}"></div><div style="flex:1"><div class="ntext">${e.msg}</div><div class="ntime">לפני ${ago}</div></div></div>`;}).join('');}
function markRead(){lastSeen=Date.now();updateBadge();renderN();}

function renderShop(){
  const p=state.shop.filter(i=>!i.done),d=state.shop.filter(i=>i.done);
  document.getElementById('spend').innerHTML=p.length?p.map(sc).join(''):'<div class="empty">הרשימה ריקה 🎉</div>';
  document.getElementById('sdone').innerHTML=d.map(sc).join('');
  document.getElementById('sdone-wrap').style.display=d.length?'':'none';}
function sc(i){return`<div class="icard ${i.done?'done':''}"><div class="cb ${i.done?'chk':''}" onclick="togShop(${i.id})">${i.done?'✓':''}</div><span class="itext">${i.text}</span><span class="bytag">${i.by}</span><button class="idel" onclick="delShop(${i.id})">✕</button></div>`;}
function addShop(){const inp=document.getElementById('si'),t=inp.value.trim();if(!t)return;state.shop.unshift({id:uid++,text:t,done:false,by:me});renderShop();addLog(`${me} הוסיפ${suf(me)} "${t}" לרשימת הקניות`);inp.value='';save('shop');}
function togShop(id){const i=state.shop.find(x=>x.id===id);if(!i)return;i.done=!i.done;if(i.done)addLog(`${me} סימנ${suf(me)} "${i.text}" כנקנה ✓`);renderShop();save('shop');}
function delShop(id){const i=state.shop.find(x=>x.id===id);if(i)addLog(`${me} הסיר${suf(me)} "${i.text}" מהקניות`);state.shop=state.shop.filter(x=>x.id!==id);renderShop();save('shop');}

function parseD(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function renderEv(){
  const cl={kids:'bk',couple:'bc',general:'bg'},lb={kids:'ילדים',couple:'זוג',general:'כללי'};
  const today=new Date();today.setHours(0,0,0,0);
  const sorted=[...state.evs].sort((a,b)=>(parseD(a.dateStr)||new Date(9e15))-(parseD(b.dateStr)||new Date(9e15)));
  const up=sorted.filter(e=>!e.dateStr||(parseD(e.dateStr)>=today));
  const past=sorted.filter(e=>e.dateStr&&parseD(e.dateStr)<today);
  let h='';up.forEach(e=>{const d=parseD(e.dateStr);h+=evCard(e,cl,lb,false,d&&d.getTime()===today.getTime());});
  if(past.length){h+=`<div class="sep-label">עבר</div>`;past.forEach(e=>{h+=evCard(e,cl,lb,true,false);});}
  document.getElementById('evlist').innerHTML=h||'<div class="empty">אין אירועים קרובים</div>';}
function evCard(e,cl,lb,past,isTd){const d=parseD(e.dateStr);
  return`<div class="ecard ${past?'past':''}"><div class="edate"><div class="day">${d?d.getDate():'—'}${isTd?'<span class="today-dot"></span>':''}</div><div class="mon">${d?MNS[d.getMonth()]:''}</div></div>
  <div class="einfo"><div class="ename">${e.name}</div><div class="esub"><span class="bdg ${cl[e.cat]}">${lb[e.cat]}</span>${e.timeStr?`<span>${e.timeStr}</span>`:''}<span style="color:#c7c7cc">· ${e.by}</span></div></div>
  <button class="idel" onclick="delEv(${e.id})">✕</button></div>`;}
let evOpen=false;
function toggleEvForm(){evOpen=!evOpen;document.getElementById('evform').classList.toggle('open',evOpen);if(evOpen){document.getElementById('evdate').value=new Date().toISOString().split('T')[0];document.getElementById('evi').focus();}}
function closeEvForm(){evOpen=false;document.getElementById('evform').classList.remove('open');document.getElementById('evi').value='';}
function selCat(c){selcat=c;['kids','couple','general'].forEach(x=>document.getElementById('cat-'+x).classList.toggle('sel',x===c));}
function addEv(){const name=document.getElementById('evi').value.trim();if(!name)return;
  const dateStr=document.getElementById('evdate').value,timeStr=document.getElementById('evtime').value;
  state.evs.push({id:uid++,name,dateStr,timeStr,cat:selcat,by:me});
  const d=parseD(dateStr);addLog(`${me} הוסיפ${suf(me)} אירוע: "${name}"${d?` ב${d.getDate()} ב${MN[d.getMonth()]}`:''}`);
  renderEv();closeEvForm();save('evs');}
function delEv(id){const e=state.evs.find(x=>x.id===id);if(e)addLog(`${me} הסיר${suf(me)} אירוע: "${e.name}"`);state.evs=state.evs.filter(x=>x.id!==id);renderEv();save('evs');}

function renderTask(){document.getElementById('tasklist').innerHTML=state.tasks.length?state.tasks.map(t=>`<div class="tcard ${t.done?'done':''}"><div class="cb ${t.done?'chk':''}" onclick="togTask(${t.id})">${t.done?'✓':''}</div><span class="tname">${t.name}</span><span class="wtag" onclick="cycleWho(${t.id})">${t.who}</span><button class="idel" onclick="delTask(${t.id})">✕</button></div>`).join(''):'<div class="empty">אין משימות</div>';}
function addTask(){const inp=document.getElementById('tski'),t=inp.value.trim();if(!t)return;state.tasks.unshift({id:uid++,name:t,done:false,who:me});renderTask();addLog(`${me} הוסיפ${suf(me)} משימה: "${t}"`);inp.value='';save('tasks');}
function togTask(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;t.done=!t.done;if(t.done)addLog(`${me} סיימ${suf(me)} משימה: "${t.name}" ✓`);renderTask();save('tasks');}
function cycleWho(id){const t=state.tasks.find(x=>x.id===id);if(!t)return;const o=['זיו','שני','שניהם'];t.who=o[(o.indexOf(t.who)+1)%o.length];addLog(`${me} שינ${me==='שני'?'תה':''} אחראי ל"${t.name}": ${t.who}`);renderTask();save('tasks');}
function delTask(id){const t=state.tasks.find(x=>x.id===id);if(t)addLog(`${me} מח${suf(me)} משימה: "${t.name}"`);state.tasks=state.tasks.filter(x=>x.id!==id);renderTask();save('tasks');}

function renderRem(){document.getElementById('remlist').innerHTML=state.rems.length?state.rems.map(r=>`<div class="rcard"><span style="font-size:22px">🔔</span><div style="flex:1"><div class="rname">${r.name}</div><div class="rwho">הוסיפ${suf(r.by)} ${r.by}</div></div><button class="idel" onclick="delRem(${r.id})">✕</button></div>`).join(''):'<div class="empty">אין תזכורות</div>';}
function addRem(){const inp=document.getElementById('remi'),t=inp.value.trim();if(!t)return;state.rems.unshift({id:uid++,name:t,by:me});renderRem();addLog(`${me} הוסיפ${suf(me)} תזכורת: "${t}"`);inp.value='';save('rems');}
function delRem(id){const r=state.rems.find(x=>x.id===id);if(r)addLog(`${me} הסיר${suf(me)} תזכורת: "${r.name}"`);state.rems=state.rems.filter(x=>x.id!==id);renderRem();save('rems');}

function fmtT(t){const d=new Date(t);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function sameDay(a,b){return new Date(a).toDateString()===new Date(b).toDateString();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMsgs(){
  const f=document.getElementById('msgfeed');
  if(!state.msgs.length){f.innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#8e8e93;font-size:17px;padding:40px;text-align:center"><div style="font-size:50px">💌</div><p>עדיין אין הודעות</p></div>';return;}
  let h='';state.msgs.forEach((m,i)=>{const mine=m.from===me,prev=state.msgs[i-1];
    if(!prev||!sameDay(prev.t,m.t)){const d=new Date(m.t);h+=`<div class="day-sep">${d.getDate()} ב${MN[d.getMonth()]}</div>`;}
    h+=`<div class="bwrp ${mine?'mine':'theirs'}"><div class="bubble ${mine?'mine':'theirs'}">${esc(m.text)}</div><div class="bmeta">${mine?'':m.from+' · '}${fmtT(m.t)}</div></div>`;});
  f.innerHTML=h;f.scrollTop=f.scrollHeight;}
function sendMsg(){const inp=document.getElementById('msgi'),t=inp.value.trim();if(!t)return;
  const other=me==='זיו'?'שני':'זיו';state.msgs.push({id:uid++,from:me,text:t,t:Date.now()});renderMsgs();
  addLog(`${me} שלח${suf(me)} הודעה אישית ל${other} 💌`);inp.value='';inp.style.height='';document.getElementById('msgsend').disabled=true;save('msgs');}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';document.getElementById('msgsend').disabled=!el.value.trim();}
function msgKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function showTab(tab,btn){
  document.querySelectorAll('.section').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('sec-'+tab);el.style.display=tab==='msg'?'flex':'block';el.classList.add('active');btn.classList.add('active');
  if(tab==='msg')setTimeout(()=>{const f=document.getElementById('msgfeed');if(f)f.scrollTop=f.scrollHeight;},50);}

function setMe(name){
  me=name;lastSeen=0;document.getElementById('id-screen').style.display='none';document.getElementById('main-app').style.display='block';setConn(false);
  ['si','tski','remi'].forEach((id,i)=>{const fns=[addShop,addTask,addRem];document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')fns[i]();});});
  startListeners();}
</script>
</body>
</html>
